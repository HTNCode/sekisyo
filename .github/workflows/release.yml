name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "バイナリを添付するリリースのタグ (例: v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-assets:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Build binaries
        run: |
          mkdir -p dist/release
          for target in linux-x64 linux-arm64 darwin-x64 darwin-arm64 windows-x64; do
            ext=""
            if [ "$target" = "windows-x64" ]; then ext=".exe"; fi
            bun build ./src/bin/sekisyo.ts --compile --target="bun-$target" \
              --outfile "dist/release/sekisyo-$TAG-$target$ext"
          done
      - name: Generate checksums
        working-directory: dist/release
        run: sha256sum * > SHA256SUMS
      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" dist/release/* --clobber
