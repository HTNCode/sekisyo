name: Sekisyo record

on:
  pull_request_target:
    types:
      - edited
      - opened
      - ready_for_review
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the trusted PR base revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha }}
      - name: Verify the PR record
        env:
          EVENT_PATH: ${{ github.event_path }}
        run: node .github/scripts/verify-sekisyo-record.cjs
