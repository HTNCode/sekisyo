name: 機能要望 / Feature request
description: 新機能や改善の提案
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: どんな場面で何に困っているか
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: あれば
